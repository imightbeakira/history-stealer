<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body {
            width: 320px;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            padding: 20px;
            border-radius: 24px;
            color: #eef5ff;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .shield-icon {
            background: #2a6df4;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .title {
            font-weight: 700;
            font-size: 20px;
        }
        .badge {
            background: #1f2a48;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 30px;
            color: #8a9bcf;
        }
        .status-card {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 18px;
            text-align: center;
            border: 1px solid rgba(72, 187, 255, 0.2);
            margin-bottom: 24px;
            transition: all 0.2s;
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #ef4444;
            box-shadow: 0 0 4px #ef4444;
        }
        .status-led.connected {
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
        }
        .status-text {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .location {
            font-size: 28px;
            font-weight: 800;
            margin: 8px 0 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .flag {
            font-size: 28px;
        }
        .ip {
            font-family: monospace;
            background: #0c1122;
            padding: 4px 10px;
            border-radius: 40px;
            display: inline-block;
            font-size: 12px;
            margin-top: 8px;
        }
        .toggle-btn {
            background: #1e293b;
            border: none;
            width: 70px;
            height: 34px;
            border-radius: 60px;
            margin: 16px auto 0;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            padding: 3px;
        }
        .toggle-knob {
            background: white;
            width: 28px;
            height: 28px;
            border-radius: 28px;
            transition: 0.2s;
            transform: translateX(0);
            box-shadow: 0 1px 3px black;
        }
        .toggle-btn.active {
            background: #2a6df4;
        }
        .toggle-btn.active .toggle-knob {
            transform: translateX(36px);
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin: 20px 0 16px;
            font-size: 12px;
            background: #0f1428;
            padding: 12px 16px;
            border-radius: 20px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-weight: bold;
            font-size: 16px;
            color: #2a6df4;
        }
        .server-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 8px;
        }
        .server-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #1e2745;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .server-item:hover {
            background: rgba(42,109,244,0.1);
        }
        .server-name {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .ping {
            font-size: 10px;
            color: #6c7ab0;
        }
        .footer-note {
            font-size: 10px;
            text-align: center;
            margin-top: 18px;
            color: #4b5580;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f1428; }
        ::-webkit-scrollbar-thumb { background: #2a6df4; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <div class="shield-icon">🛡️</div>
    <div class="title">SecureVPN <span class="badge">PREMIUM</span></div>
</div>

<div class="status-card" id="statusCard">
    <div class="status-row">
        <div class="status-led" id="statusLed"></div>
        <div class="status-text" id="statusText">Disconnected</div>
    </div>
    <div class="location">
        <span class="flag" id="flagEmoji">🌍</span>
        <span id="locationName">Not connected</span>
    </div>
    <div class="ip" id="fakeIp">0.0.0.0</div>
    <div id="toggleBtn" class="toggle-btn">
        <div class="toggle-knob"></div>
    </div>
</div>

<div class="stats">
    <div class="stat"><div class="stat-value" id="dataSaved">0</div><div>MB saved</div></div>
    <div class="stat"><div class="stat-value" id="threatsBlocked">0</div><div>threats</div></div>
    <div class="stat"><div class="stat-value">P2P</div><div>allowed</div></div>
</div>

<div style="font-size: 13px; font-weight: 500; margin: 4px 0 6px;">🌍 Recommended servers</div>
<div class="server-list" id="serverList">
    <div class="server-item" data-loc="New York" data-flag="🇺🇸" data-ip="192.241.130.12">
        <div class="server-name"><span>🇺🇸</span> New York</div>
        <div class="ping">23 ms</div>
    </div>
    <div class="server-item" data-loc="Amsterdam" data-flag="🇳🇱" data-ip="185.107.80.45">
        <div class="server-name"><span>🇳🇱</span> Amsterdam</div>
        <div class="ping">89 ms</div>
    </div>
    <div class="server-item" data-loc="Tokyo" data-flag="🇯🇵" data-ip="103.152.112.78">
        <div class="server-name"><span>🇯🇵</span> Tokyo</div>
        <div class="ping">145 ms</div>
    </div>
    <div class="server-item" data-loc="Frankfurt" data-flag="🇩🇪" data-ip="94.130.28.99">
        <div class="server-name"><span>🇩🇪</span> Frankfurt</div>
        <div class="ping">41 ms</div>
    </div>
    <div class="server-item" data-loc="London" data-flag="🇬🇧" data-ip="87.117.252.13">
        <div class="server-name"><span>🇬🇧</span> London</div>
        <div class="ping">52 ms</div>
    </div>
</div>

<div class="footer-note">
    🔒 Zero-log policy • WireGuard® • Kill switch active
</div>

<script src="popup.js"></script>
</body>
</html>
